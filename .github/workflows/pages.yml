name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate static PWA
        run: |
          test -s index.html
          test -s manifest.webmanifest
          test -s sw.js
          test -s icon.svg
          test -s icon-maskable.svg
          python -m json.tool manifest.webmanifest > /dev/null
          grep -q 'manifest.webmanifest' index.html
          grep -q 'serviceWorker.register' index.html
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
